services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/surveys}
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongo

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo-data: