server {
    listen 80;
    server_name localhost;

    # Route 1: בקשות API → server (Express)
    location /api/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route 2: בקשות לסקרים (slug)
    location /s/ {
        # בעתיד - יגיש את ה-React build
        # כרגע זה זמני - נטפל בזה כשיהיה client
        return 200 'Survey link will work after client is built';
        add_header Content-Type text/plain;
    }

    # Route 3: כל השאר → דף ראשי
    location / {
        # בעתיד - React build
        # כרגע זה placeholder
        return 200 'Welcome! API at /api/health';
        add_header Content-Type text/plain;
    }
}